services:
  db:
    image: postgres:16
    container_name: pathfinder_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-pathfinder_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pathfinder_pass}
      POSTGRES_DB: ${DB_NAME:-pathfinder_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
